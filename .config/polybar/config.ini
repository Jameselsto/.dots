[colors]
bg = #070707
fg = #ffffff
bg-alt = #1c1c1c
orange = #ffa914
red = #ff4f44
grey = #a2a2a7
green = #3ce155
blue = #148eff

[bar/mybar]
font-0 = JetBrainsMono Nerd Font:size=12;3.4
font-1 = icomoon:style=Regular:size=14;3
font-2 = JetBrainsMono Nerd Font:size=11;4
font-3 = JetBrainsMono Nerd Font:size=16;3
font-4 = JetBrainsMono Nerd Font:size=12;3
font-5 = JetBrainsMono Nerd Font:size=14;4

monitor = ${env:MONITOR:}
override-redirect = false
wm-name = i3
locale = en_US.UTF-8

top = true
fixed-center = true

width = 100%
height = 36
offset-x = 0
offset-y = 0

background = ${colors.bg}
foreground = ${colors.fg}

radius = 0
line-size = 0
line-color =
border-size = 0
border-color =

padding = 1.5
module-margin = 1.5
separator = ""

modules-left = xworkspaces
modules-right = memory cpu network pulseaudio date time

cursor-click = pointer
cursor-scroll = ns-resize

dim-value = 1.0
dpi = 0
enable-ipc = true

[module/systray]
type = internal/tray

format-margin = 8pt
tray-spacing = 16pt

[module/xworkspaces]
type = internal/xworkspaces

label-active = %name%
label-active-padding = 1

label-occupied = %name%
label-occupied-foreground = ${colors.grey}
label-occupied-padding = 1

label-urgent = %name%
label-urgent-foreground = ${colors.red}
label-urgent-padding = 1

label-empty = %name%
label-empty-foreground = ${colors.blue}
label-empty-padding = 1

[module/xwindow]
type = internal/xwindow
format = <label>
format-background = ${colors.bg}
format-foreground = ${colors.fg}
format-padding = 2
label = %title%
label-maxlen = 70

[module/filesystem]
type = internal/fs
interval = 25

mount-0 = /

label-mounted = %{F#F0C674}%mountpoint%%{F-} %percentage_used%%

label-unmounted = %mountpoint% not mounted
label-unmounted-foreground = ${colors.red}

[module/pulseaudio]
type = internal/pulseaudio

use-ui-max = false 

interval = 5
reverse-scroll = false 

format-volume = <ramp-volume><label-volume>
format-volume-font = 5
format-muted = <label-muted>
format-muted-font = 5

label-volume = %percentage%%
label-volume-font = 2

label-muted = "Ó®Ć %percentage%%"
label-muted-font = 2
label-muted-foreground = ${colors.grey}

ramp-volume-0 = "Ó®Č"
ramp-volume-1 = "Ó®ä"
ramp-volume-2 = "Ó®č"

click-right = pavucontrol

[module/memory]
type = internal/memory

interval = 0.7
warn-percentage = 90 
format = <label>
format-warn = <label-warn>
label = %gb_used%
label-warn = %%gb_used%

[module/cpu]
type = internal/cpu

interval = 0.5 
warn-percentage = 92

format = "Ôíľ <label>"
format-font = 5
format-foreground = ${colors.white}
label = " %percentage%%"
label-font = 1
label-padding = 0.5

format-warn = "Ôíľ <label-warn>"
format-warn-font = 5
format-warn-foreground = ${colors.red}
label-warn = " %percentage%%"
label-warn-font = 1
label-warn-padding = 0.5

[module/network]
type = internal/network

interface = eno1
interface-type = wired
interval = 3.0
ping-interval = 3
accumulate-stats = false 
unknown-as-up = false 
speed-unit = 

format-connected = <label-connected>
format-disconnected = <label-disconnected>
format-packetloss = <animation-packetloss>

label-connected = %{F#3ce155}ÔÉó%{F-} %downspeed%
label-connected-foreground = ${colors.grey} 

label-disconnected = "ůįĆô "
label-disconnected-foreground = ${colors.red}

label-packetloss = %downspeed%
label-packetloss-foreground = ${colors.fg} 

animation-packetloss-0 = Ó©¨
animation-packetloss-0-foreground = ${colors.red}
animation-packetloss-1 = 
animation-packetloss-1-foreground =  
animation-packetloss-framerate = 500

[module/battery]
type = internal/battery

full-at = 95
low-at = 25 

battery = BAT0
adapter = ADP0

poll-interval = 4 

time-format = %H:%M

format-charging = <animation-charging><label-charging>
format-charging-font = 6
format-discharging = <ramp-capacity><label-discharging>
format-discharging-font = 6 
format-full = <ramp-capacity><label-full>
format-full-font = 6 
format-low = <animation-low><label-low>
format-low-font = 6 

label-charging = %percentage_raw%%
label-charging-font = 1
label-discharging = %percentage_raw%%
label-discharging-font = 1
label-full = %percentage_raw%%
label-full-font = 1
label-low = %percentage_raw%%
label-low-font = 1

ramp-capacity-0  = "ůįāé "
ramp-capacity-1  = "ůįĀļ "
ramp-capacity-2  = "ůįĀĽ "
ramp-capacity-3  = "ůįĀľ "
ramp-capacity-4  = "ůįĀĹ "
ramp-capacity-5  = "ůįĀĺ "
ramp-capacity-6  = "ůįĀŅ "
ramp-capacity-7  = "ůįāÄ "
ramp-capacity-8  = "ůįāĀ "
ramp-capacity-9  = "ůįāā "
ramp-capacity-10 = "ůįĀĻ "

animation-charging-0  = "ůįĘü "
animation-charging-1  = "ůįĘú "
animation-charging-2  = "ůįāÜ "
animation-charging-3  = "ůįāá "
animation-charging-4  = "ůįāą "
animation-charging-5  = "ůįĘĚ "
animation-charging-6  = "ůįāČ "
animation-charging-7  = "ůįĘě "
animation-charging-8  = "ůįāä "
animation-charging-9  = "ůįāč "
animation-charging-10 = "ůįāÖ "
animation-charging-foreground = ${colors.green}
animation-charging-framerate  = 750

animation-low-0 = "ůįāÉ "
animation-low-1 = "ůįāé "
animation-low-foreground = ${colors.red}
animation-low-framerate = 500

[module/date]
type = internal/date

interval = 1.0
label = %date%
format = <label>
format-font = 1
date = %d/%m %Y
date-alt = %a %d/%m %Y

[module/time]
type = internal/date

interval = 1.0
format = <label>
format-font = 1
label = %time%
time = %H:%M
time-alt = %H:%M:%S

[settings]
screenchange-reload = true
compositing-background = source
compositing-foreground = over
compositing-overline = over
compositing-underline = over
compositing-border = over

; Enables pseudo-transparency for the bar
; If set to true the bar can be transparent without a compositor.
pseudo-transparency = false
